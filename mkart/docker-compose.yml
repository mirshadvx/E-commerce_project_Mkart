# version: '3.9'

services:
  web:
    build: .
    container_name: mkart_web
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    depends_on:
      - db
    environment:
      POSTGRES_DB: mkart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mnbmnb
      POSTGRES_HOST: db
    env_file:
      - ./mkart/.env

  db:
    image: postgres:15
    container_name: mkart_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mkart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mnbmnb

  nginx:
    image: nginx:latest
    container_name: mkart_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
